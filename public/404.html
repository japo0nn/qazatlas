<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>QazAtlas</title>
    <script>
      // SPA redirect for GitHub Pages — encodes the path into query string
      // so index.html can restore it via history.replaceState.
      // pathSegmentsToKeep=1 for project pages (username.github.io/repo-name)
      // Change to 0 if deploying to username.github.io root.
      var l = window.location;
      var segs = 1;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segs).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segs).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
